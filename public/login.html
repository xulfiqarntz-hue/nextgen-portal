<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGen eAcademy - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #E89FBE 0%, #D17DBE 25%, #9B6BA8 50%, #6B5B95 75%, #3D5A9E 100%);
    }
    
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    
    
    .login-box {
      background: rgba(245, 245, 250, 0.98);
      padding: 30px 50px 50px 50px;
      border-radius: 35px;
      width: 500px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .form-group {
      margin-bottom: 25px;
      position: relative;
      width: 85%;
    }
    
    .input-wrapper {
      display: flex;
      align-items: center;
      background: #ffffff;
      border-radius: 14px;
      padding: 0 18px;
      height: 50px;
      gap: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-left: 4px solid #3d5a9e;
      transition: all 0.3s ease;
    }
    
    .input-wrapper:focus-within {
      box-shadow: 0 6px 20px rgba(61, 90, 158, 0.2);
      border-left-color: #38A2D4;
    }
    
    .form-group input {
      flex: 1;
      border: none;
      background: transparent;
      color: #000000;
      font-size: 17px;
      outline: none;
      padding: 0;
      font-weight: 400;
    }
    
    .form-group input::placeholder {
      color: #999999;
      font-weight: 400;
    }
    
    .form-group input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      -webkit-text-fill-color: #000000 !important;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 25px 0;
      font-size: 14px;
      color: #4a5568;
      cursor: pointer;
      user-select: none;
    }
    
    .checkbox-custom {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3d5a9e;
    }
    
    .remember-me label {
      cursor: pointer;
      user-select: none;
      font-weight: 500;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38A2D4 0%, #2D5A9E 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 8px 20px rgba(45, 90, 158, 0.35);
    }
    
    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(45, 90, 158, 0.45);
    }
    
    .login-btn:active {
      transform: translateY(-1px);
    }
    
    #message {
      text-align: center;
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 10px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    #message.error {
      color: #c53030;
      background: rgba(245, 101, 101, 0.12);
      border: 1px solid rgba(197, 48, 48, 0.2);
    }
    
    #message.success {
      color: #22863a;
      background: rgba(34, 134, 58, 0.12);
      border: 1px solid rgba(34, 134, 58, 0.2);
    }
    
    @media (max-width: 480px) {
      .login-box {
        width: 85%;
        padding: 25px 35px 40px 35px;
      }
      
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="/nextgen-logo.png" alt="NextGen Logo" style="width: 120px; height: 120px; margin-bottom: 20px; object-fit: contain;">
      <div class="form-group">
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="ID" autocomplete="email">
        </div>
      </div>
      
      <div class="form-group">
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>
      </div>
      
      <div class="remember-me">
        <input type="checkbox" id="rememberMe" class="checkbox-custom">
        <label for="rememberMe">Remember me</label>
      </div>
      
      <button class="login-btn" onclick="login()">LOGIN</button>
      
      <div id="message"></div>
    </div>
  </div>

  <script>
    // Load saved credentials if Remember me was checked
    window.addEventListener('DOMContentLoaded', function() {
      const savedID = localStorage.getItem('rememberedID');
      const rememberMe = localStorage.getItem('rememberMe') === 'true';
      
      if (rememberMe && savedID) {
        document.getElementById('email').value = savedID;
        document.getElementById('rememberMe').checked = true;
      }
    });
    
    async function login() {
      const id = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const rememberMe = document.getElementById('rememberMe').checked;
      const messageEl = document.getElementById('message');
      
      messageEl.innerText = '';
      messageEl.className = '';

      if (!id || !password) {
        messageEl.innerText = 'Please enter both ID and password';
        messageEl.className = 'error';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: id, password })
        });

        const data = await res.json();

        if (res.ok) {
          // Save remember me preference
          if (rememberMe) {
            localStorage.setItem('rememberedID', id);
            localStorage.setItem('rememberMe', 'true');
          } else {
            localStorage.removeItem('rememberedID');
            localStorage.setItem('rememberMe', 'false');
          }
          
          // Save login data
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('name', data.name);
          // Decode JWT payload to extract our own MongoDB _id (used for call/whiteboard rooms)
          try {
            const payload = JSON.parse(atob(data.token.split('.')[1]));
            localStorage.setItem('userId', payload.id);
          } catch (_) {}

          messageEl.innerText = 'Login successful! Redirecting...';
          messageEl.className = 'success';

          // Redirect based on role
          setTimeout(() => {
            if (data.role === 'student') {
              window.location.href = '/student-dashboard.html';
            } else if (data.role === 'teacher') {
              window.location.href = '/teacher-dashboard.html';
            } else if (data.role === 'subadmin') {
              window.location.href = '/subadmin-dashboard.html';
            } else if (data.role === 'mainadmin') {
              window.location.href = '/mainadmin-dashboard.html';
            } else {
              messageEl.innerText = 'Unknown role';
              messageEl.className = 'error';
            }
          }, 500);
        } else {
          messageEl.innerText = data.error || 'Login failed';
          messageEl.className = 'error';
        }
      } catch (err) {
        messageEl.innerText = 'Error: ' + err.message;
        messageEl.className = 'error';
      }
    }
    
    // Allow Enter key to login
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
