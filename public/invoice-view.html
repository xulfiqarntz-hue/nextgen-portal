<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Invoice</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; color: #0f172a; }
    .header { display:flex; justify-content:space-between; align-items:center; }
    .company { font-weight:700; font-size:20px; }
    .invoice-meta { text-align:right; }
    .box { border:1px solid #ddd; padding:18px; border-radius:6px; margin-top:18px; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { border:1px solid #e6e6e6; padding:8px; text-align:left; }
    .right { text-align:right; }
    .actions { margin-top:14px; }
    .btn { padding:8px 12px; border-radius:6px; cursor:pointer; border:none; }
    .btn-print { background:#1e40af; color:#fff; }
  </style>
</head>
<body>
  <div id="root">
    <div class="header">
      <div>
        <div class="company">NextGen eAcademy</div>
        <div>Anywhere, Anytime</div>
      </div>
      <div class="invoice-meta">
        <div>Invoice</div>
        <div id="issueDate"></div>
      </div>
    </div>

    <div class="box">
      <div><strong>Student:</strong> <span id="studentName"></span></div>
      <div><strong>Tutor:</strong> <span id="tutorName"></span></div>
      <div style="margin-top:8px;"><strong>Month:</strong> <span id="month"></span></div>

      <table>
        <thead><tr><th>S/No</th><th>Subject</th><th>No of Days</th><th>Month</th><th class="right">Amount</th></tr></thead>
        <tbody id="items"></tbody>
      </table>

      <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <div style="width:320px;">
          <div style="display:flex;justify-content:space-between;"><div>Payment</div><div id="payment"></div></div>
          <div style="display:flex;justify-content:space-between;"><div>Discount</div><div id="discount"></div></div>
          <div style="display:flex;justify-content:space-between;font-weight:700;"><div>Total</div><div id="total"></div></div>
          <div style="display:flex;justify-content:space-between;"><div>Bank</div><div id="bank"></div></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-print" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const token = localStorage.getItem('token');
    if (!id) { document.getElementById('root').innerText = 'Missing invoice id'; }

    async function load() {
      try {
        const res = await fetch('/api/invoices/get/' + id, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!res.ok) { document.getElementById('root').innerText = data.error || 'Unable to load invoice'; return; }
        const inv = data.invoice;
        document.getElementById('studentName').innerText = inv.student?.name || '';
        document.getElementById('tutorName').innerText = inv.teacher?.name || '';
        document.getElementById('month').innerText = inv.month;
        document.getElementById('payment').innerText = inv.payment;
        document.getElementById('discount').innerText = inv.discount;
        document.getElementById('total').innerText = inv.total;
        document.getElementById('bank').innerText = (inv.bankName || '') + ' ' + (inv.bankAccountNo || '');
        document.getElementById('issueDate').innerText = new Date(inv.createdAt).toLocaleDateString();

        // render single line item for now
        const tbody = document.getElementById('items');
        tbody.innerHTML = `<tr><td>1</td><td>Tuition</td><td>-</td><td>${inv.month}</td><td class="right">${inv.payment}</td></tr>`;
      } catch (err) {
        document.getElementById('root').innerText = 'Error: ' + err.message;
      }
    }

    load();
  </script>
</body>
</html>
