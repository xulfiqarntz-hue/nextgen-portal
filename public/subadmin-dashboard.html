<!DOCTYPE html>
<html>
<head>
  <title>Sub Admin Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 30px; }
    .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { color: #1a3c6e; }
    select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #1a3c6e; color: white; border: none; cursor: pointer; }
    #logoutBtn { background: #b91c1c; margin-top: 20px; }
    #message { margin-top: 15px; text-align: center; }
    hr { margin: 25px 0; border: none; border-top: 1px solid #ddd; }
    #viewChatBox { margin-top: 10px; height: 220px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; }
    .msg { padding: 8px 12px; margin: 6px 0; border-radius: 8px; max-width: 75%; clear: both; }
    .fromStudent { background: #e5e7eb; color: #111; float: left; }
    .fromTeacher { background: #1a3c6e; color: white; float: right; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="welcome">Welcome</h2>
    <p>Assign a Student to a Teacher:</p>

    <label>Student:</label>
    <select id="studentSelect"></select>

    <label>Teacher:</label>
    <select id="teacherSelect"></select>

    <button onclick="assign()">Assign</button>
    <p id="message"></p>

    <hr>

    <p>View a Student-Teacher Conversation (read-only):</p>
    <label>Student:</label>
    <select id="viewStudentSelect"></select>

    <label>Teacher:</label>
    <select id="viewTeacherSelect"></select>

    <button onclick="viewChat()">View Chat</button>
    <div id="viewChatBox"></div>

    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const role = localStorage.getItem('role');

    if (!token || (role !== 'subadmin' && role !== 'mainadmin')) {
      window.location.href = '/login.html';
    }

    document.getElementById('welcome').innerText = 'Welcome, ' + name;

    async function loadUsers() {
      const res = await fetch('/api/all-users', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();

      [document.getElementById('studentSelect'), document.getElementById('viewStudentSelect')].forEach(function(sel) {
        data.students.forEach(function(s) {
          const opt = document.createElement('option');
          opt.value = s._id;
          opt.innerText = s.name + ' (' + s.email + ')';
          sel.appendChild(opt);
        });
      });

      [document.getElementById('teacherSelect'), document.getElementById('viewTeacherSelect')].forEach(function(sel) {
        data.teachers.forEach(function(t) {
          const opt = document.createElement('option');
          opt.value = t._id;
          opt.innerText = t.name + ' (' + t.email + ')';
          sel.appendChild(opt);
        });
      });
    }

    async function assign() {
      const studentId = document.getElementById('studentSelect').value;
      const teacherId = document.getElementById('teacherSelect').value;

      const res = await fetch('/api/assign', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ studentId, teacherId })
      });

      const data = await res.json();
      document.getElementById('message').innerText = data.message || data.error;
    }

    async function viewChat() {
      const studentId = document.getElementById('viewStudentSelect').value;
      const teacherId = document.getElementById('viewTeacherSelect').value;

      const res = await fetch('/api/chat/view/' + studentId + '/' + teacherId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const box = document.getElementById('viewChatBox');
      box.innerHTML = '';

      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(function(m) {
          const div = document.createElement('div');
          div.className = 'msg ' + (m.sender === studentId ? 'fromStudent' : 'fromTeacher');
          div.innerText = m.text;
          box.appendChild(div);
        });
      } else {
        box.innerText = 'No messages between these two yet.';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    loadUsers();
  </script>
</body>
</html>
