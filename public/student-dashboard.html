<!DOCTYPE html>
<html>

<head>
  <title>Student Dashboard</title>
  <script src="https://meet.jit.si/external_api.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #1E40AF;
      --panel: #1E3A8A;
      --surface: #1E40AF;
      --surface-alt: #1E429F;
      --text: #ffffff;
      --muted: #6b7280;
      --card: #233c92;
      --border: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      width: 100%;
      font-family: Inter, system-ui, sans-serif;
      color: #111827;
      background: #f3f4f6;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: 100vh;
      height: 100vh;
      padding: 0;
    }

    .sidebar {
      background: rgb(247 247 247);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .sidebar-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
    }

    .logout-btn {
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgb(107 114 128 / 10%);
      color: #111827;
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .logout-btn:hover {
      transform: scale(0.95);
    }

    .search-box {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #ffffff;
      color: #111827;
      caret-color: #111827;
      cursor: text;
    }

    .search-box input:focus {
      outline: none;
      border-color: rgba(107, 114, 128, 0.7);
      background: #ffffff;
      color: #111827;
      caret-color: #111827;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .chat-item {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      margin: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
      color: #111827;
      text-align: left;
    }

    .chat-item:hover,
    .chat-item.active {
      background: rgba(14, 165, 233, 0.12);
    }

    .unread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 28px;
      padding: 0 10px;
      background: #ef4444;
      color: #ffffff;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgb(107 114 128 / 15%);
      font-weight: 700;
      color: #111827;
      font-size: 1rem;
    }

    .chat-info {
      min-width: 0;
      text-align: left;
    }

    .chat-name {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111827;
    }

    .chat-last {
      margin: 6px 0 0;
      color: rgba(17, 24, 39, 0.65);
      font-size: 0.88rem;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 0;
      overflow: hidden;
      color: #111827;
    }

    .main-panel-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: #ffffff;
      gap: 8px;
    }

    .main-panel-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      color: #111827;
    }

    .main-panel-header p {
      margin: 0;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 28px 20px;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
      overflow: hidden;
    }

    .messages {
      /* grow to fill the available space and scroll under the typing area */
      display: grid;
      gap: 14px;
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Ensure the chatSection wrapper participates in flex layout so #chatBox can grow */
    #chatSection {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    #chatBox {
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 4px;
    }

    .message-row {
      display: flex;
      align-items: center;
      max-width: 78%;
    }

    .message-row.mine {
      margin-left: auto;
      justify-content: flex-end;
    }

    .message-row.theirs {
      justify-content: flex-start;
    }

    .message-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      border: none;
      color: #ffffff;
      min-width: 100px;
      max-width: 100%;
      box-shadow: 0 10px 25px rgba(14, 42, 99, 0.08);
    }

    .message-row.mine .message-bubble {
      background: #1E3A8A;
    }

    .message-row.theirs .message-bubble {
      background: #e5e7eb;
      color: #0f172a;
      box-shadow: none;
    }

    .message-time {
      margin: 0 0 0 10px;
      color: #64748b;
      font-size: 0.78rem;
      text-align: right;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
    }

    .bottom-bar {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding: 18px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #f8fafc;
    }

    .bottom-bar.hidden {
      display: none;
    }

    .bottom-bar input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      padding: 14px 16px;
      font-size: 0.96rem;
    }

    .bottom-bar button {
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      height: 48px;
      cursor: pointer;
      font-weight: 700;
      display: grid;
      place-items: center;
      background: #1E3A8A;
      color: #ffffff;
      width: 48px;
      min-width: 48px;
      font-size: 1.1rem;
      line-height: 1;
    }

    /* ── Call & Whiteboard action bar ── */
    .chat-action-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 28px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      background: #f0f4ff;
    }

    .chat-action-bar.visible {
      display: flex;
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 18px;
      height: 38px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-action:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30,58,138,0.18);
    }

    .btn-call {
      background: #1E3A8A;
      color: #fff;
    }

    .btn-whiteboard {
      background: #fff;
      color: #1E3A8A;
      border: 1.5px solid #1E3A8A;
    }

    /* ── Overlay panels (cover the main-panel area) ── */
    .tool-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 20;
      flex-direction: column;
      background: #fff;
    }

    .tool-overlay.open {
      display: flex;
    }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #1E3A8A;
      color: #fff;
      flex-shrink: 0;
    }

    .overlay-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .overlay-header .overlay-meta {
      font-size: 0.82rem;
      opacity: 0.75;
      margin-top: 2px;
    }

    .btn-end {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      height: 36px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      background: #ef4444;
      color: #fff;
      transition: transform 0.15s ease;
    }

    .btn-end:hover { transform: scale(0.96); }

    .overlay-body {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ── Canvas Whiteboard ── */
    #wbCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
      background: #fff;
    }

    .wb-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .wb-toolbar label {
      font-size: 0.78rem;
      color: #6b7280;
      font-weight: 600;
    }

    .wb-color-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .wb-color-swatch.active { border-color: #1E3A8A; transform: scale(1.2); }

    .wb-size-btn {
      height: 28px;
      padding: 0 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .wb-size-btn.active { background: #1E3A8A; color: #fff; border-color: #1E3A8A; }

    .wb-action-btn {
      height: 28px;
      padding: 0 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .wb-action-btn:hover { background: #f0f4ff; }
    .wb-action-btn.eraser { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .wb-action-btn.eraser.active { background: #dc2626; color: #fff; }

    .wb-status {
      margin-left: auto;
      font-size: 0.75rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .wb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .wb-dot.offline { background: #f87171; }

    .overlay-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #6b7280;
      font-size: 0.95rem;
      background: #f8fafc;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #1E3A8A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* make main-panel a positioning context for overlays */
    .main-panel { position: relative; }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }

      .main-panel {
        min-height: 560px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Chats</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="Search teachers...">
      </div>
      <div id="teacherList" class="chat-list">Loading teachers...</div>
    </aside>

    <section class="main-panel">
      <div class="main-panel-header">
        <h2 id="welcome">Welcome</h2>
        <p id="chatTitle">Select a teacher to begin</p>
      </div>

      <!-- Action toolbar (Call + Whiteboard) -->
      <div id="actionBar" class="chat-action-bar">
        <button id="btnCall" class="btn-action btn-call" onclick="startCall()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58z"/>
          </svg>
          Start Call
        </button>
        <button id="btnWhiteboard" class="btn-action btn-whiteboard" onclick="openWhiteboard()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.499.499 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
          </svg>
          Whiteboard
        </button>
      </div>

      <div class="chat-window">
        <div id="chatSection" style="display:none;">
          <div id="chatBox" class="messages"></div>
        </div>
      </div>

      <div id="bottomBar" class="bottom-bar hidden">
        <input id="chatInput" type="text" placeholder="Type a message..." onkeydown="handleMessageKeydown(event)">
        <button class="btn-send" onclick="sendMessage()" aria-label="Send message">➤</button>
      </div>

      <!-- ── Jitsi Call Overlay ── -->
      <div id="callOverlay" class="tool-overlay">
        <div class="overlay-header">
          <div>
            <h3>📞 Audio Call</h3>
            <div class="overlay-meta" id="callMeta">Connecting…</div>
          </div>
          <button class="btn-end" onclick="endCall()">✕ End Call</button>
        </div>
        <div class="overlay-body">
          <div class="overlay-loading" id="callLoading">
            <div class="spinner"></div>
            <span>Starting call…</span>
          </div>
          <div id="callContainer" style="width:100%;height:100%;"></div>
        </div>
      </div>

      <!-- ── Shared Canvas Whiteboard Overlay ── -->
      <div id="whiteboardOverlay" class="tool-overlay">
        <div class="overlay-header">
          <div>
            <h3>🖊 Collaborative Whiteboard</h3>
            <div class="overlay-meta" id="wbMeta">Shared with your teacher</div>
          </div>
          <button class="btn-end" onclick="closeWhiteboard()">✕ Close</button>
        </div>
        <!-- Toolbar -->
        <div class="wb-toolbar">
          <label>Color:</label>
          <button class="wb-color-swatch active" data-color="#1e3a8a" style="background:#1e3a8a" title="Blue" onclick="setWbColor('#1e3a8a',this)"></button>
          <button class="wb-color-swatch" data-color="#000000" style="background:#000000" title="Black" onclick="setWbColor('#000000',this)"></button>
          <button class="wb-color-swatch" data-color="#ef4444" style="background:#ef4444" title="Red" onclick="setWbColor('#ef4444',this)"></button>
          <button class="wb-color-swatch" data-color="#22c55e" style="background:#22c55e" title="Green" onclick="setWbColor('#22c55e',this)"></button>
          <button class="wb-color-swatch" data-color="#f59e0b" style="background:#f59e0b" title="Orange" onclick="setWbColor('#f59e0b',this)"></button>
          <span style="width:1px;height:24px;background:#e5e7eb;margin:0 4px;"></span>
          <label>Size:</label>
          <button class="wb-size-btn" data-size="2" onclick="setWbSize(2,this)">S</button>
          <button class="wb-size-btn active" data-size="4" onclick="setWbSize(4,this)">M</button>
          <button class="wb-size-btn" data-size="10" onclick="setWbSize(10,this)">L</button>
          <span style="width:1px;height:24px;background:#e5e7eb;margin:0 4px;"></span>
          <button class="wb-action-btn eraser" id="wbEraserBtn" onclick="toggleWbEraser()">⬜ Eraser</button>
          <button class="wb-action-btn" onclick="undoWb()">↩ Undo</button>
          <button class="wb-action-btn" onclick="clearWb()">🗑 Clear All</button>
          <div class="wb-status"><div class="wb-dot" id="wbDot"></div><span id="wbConnStatus">Connecting…</span></div>
        </div>
        <div class="overlay-body">
          <div class="overlay-loading" id="wbLoading">
            <div class="spinner"></div>
            <span>Connecting to whiteboard…</span>
          </div>
          <canvas id="wbCanvas"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const role = localStorage.getItem('role');
    const myUserId = localStorage.getItem('userId') || '';
    const readStateKey = 'studentTeacherReadAt';
    let teachers = [];
    let activeTeacherId = null;
    let activeTeacher = null;
    let pollTimer = null;

    if (!token || role !== 'student') {
      window.location.href = '/login.html';
    }

    document.getElementById('welcome').innerText = 'Welcome, ' + name;

    function loadReadState() {
      try {
        const raw = localStorage.getItem(readStateKey);
        return raw ? JSON.parse(raw) : {};
      } catch (err) {
        return {};
      }
    }

    function saveReadState(state) {
      localStorage.setItem(readStateKey, JSON.stringify(state));
    }

    async function loadTeachers() {
      const readState = loadReadState();
      const res = await fetch('/api/my-teachers', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      teachers = data.teachers || [];
      teachers.forEach(t => {
        t.lastMessage = 'No messages yet.';
        t.lastMessageTime = null;
        t.lastReadAt = readState[t._id] || null;
        t.lastSender = null;
        t.unread = false;
      });

      await Promise.all(teachers.map(updateTeacherStatus));
      renderTeacherList();
      startTeacherPolling();
    }

    function renderTeacherList() {
      const container = document.getElementById('teacherList');
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      container.innerHTML = '';
      const filtered = teachers.filter(t => t.name.toLowerCase().includes(query) || (t.email || '').toLowerCase().includes(query));

      if (!filtered.length) {
        container.innerHTML = '<p style="padding:20px;color:var(--muted);">No teachers found.</p>';
        return;
      }

      filtered.forEach(function(t) {
        const div = document.createElement('button');
        div.type = 'button';
        div.className = 'chat-item' + (activeTeacherId === t._id ? ' active' : '');
        div.onclick = function() { openChat(t._id, div, t.name); };

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        const nameParts = t.name.trim().split(/\s+/);
        const initials = nameParts.length > 1
          ? (nameParts[0][0] + nameParts[1][0]).toUpperCase()
          : t.name.trim().slice(0, 2).toUpperCase();
        avatar.innerText = initials;

        const info = document.createElement('div');
        info.className = 'chat-info';
        info.innerHTML = '<p class="chat-name">' + t.name + '</p><p class="chat-last">' + (t.lastMessage || '') + '</p>';

        const meta = document.createElement('div');
        meta.style.display = 'flex';
        meta.style.alignItems = 'center';
        meta.style.justifyContent = 'flex-end';
        meta.style.gap = '8px';
        if (t.unread) {
          meta.innerHTML = '<span class="unread-badge">New</span>';
        }

        div.append(avatar, info, meta);
        container.appendChild(div);
      });
    }

    function openChat(teacherId, el, teacherName) {
      activeTeacherId = teacherId;
      activeTeacher = teachers.find(t => t._id === teacherId);
      if (activeTeacher) {
        activeTeacher.unread = false;
        activeTeacher.lastReadAt = activeTeacher.lastMessageTime || new Date().toISOString();
        const state = loadReadState();
        state[teacherId] = activeTeacher.lastReadAt;
        saveReadState(state);
      }
      document.querySelectorAll('.chat-item').forEach(function(d) { d.classList.remove('active'); });
      el.classList.add('active');
      document.getElementById('chatTitle').innerText = teacherName;
      document.getElementById('chatSection').style.display = 'flex';
      document.getElementById('bottomBar').classList.remove('hidden');
      document.getElementById('actionBar').classList.add('visible');
      // Close any open overlays when switching chats
      endCall();
      closeWhiteboard();
      loadMessages();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadMessages, 3000);
    }

    /* ── Room helpers ── */

    /** Returns [idA, idB] sorted so the order is always the same regardless of who opens first */
    function getSortedIds() {
      const ids = [myUserId, activeTeacherId].sort();
      return ids;
    }

    /** Derives a stable 22-char base64url key from a string using SHA-256 */
    async function deriveRoomKey(seed) {
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(seed));
      const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
      // base64url, trimmed to 22 chars (Excalidraw expects ~22 chars)
      return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '').slice(0, 22);
    }

    /* ── Call ── */

    let jitsiApi = null;

    function startCall() {
      if (!activeTeacherId) return;
      const [a, b] = getSortedIds();
      const roomName = 'ngp-call-' + a + '-' + b;

      document.getElementById('callMeta').innerText = 'With your teacher — Room ready';
      document.getElementById('callLoading').style.display = 'flex';
      document.getElementById('callOverlay').classList.add('open');

      // Dispose any existing session first
      if (jitsiApi) { try { jitsiApi.dispose(); } catch(_) {} jitsiApi = null; }

      setTimeout(() => {
        const container = document.getElementById('callContainer');
        container.innerHTML = '';
        const loader = document.getElementById('callLoading');

        // Guaranteed fallback: always hide spinner after 4 s
        // so Jitsi is never permanently blocked by the overlay
        const hideLoader = () => { loader.style.display = 'none'; };
        const fallbackTimer = setTimeout(hideLoader, 4000);

        try {
          jitsiApi = new JitsiMeetExternalAPI('meet.jit.si', {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: container,
            configOverwrite: {
              startWithVideoMuted: true,
              startWithAudioMuted: false,
              prejoinPageEnabled: false,
              prejoinConfig: { enabled: false },
              disableDeepLinking: true,
              enableWelcomePage: false,
              enableClosePage: false,
              disableInitialGUM: false,
              enableNoAudioDetection: false,
              enableNoisyMicDetection: false,
              requireDisplayName: false,
              disableAudioLevels: false,
              p2p: { enabled: true },
            },
            interfaceConfigOverwrite: {
              TOOLBAR_BUTTONS: ['microphone', 'hangup', 'fullscreen', 'fodeviceselection'],
              SHOW_JITSI_WATERMARK: false,
              SHOW_WATERMARK_FOR_GUESTS: false,
              SHOW_BRAND_WATERMARK: false,
              DISPLAY_WELCOME_PAGE_CONTENT: false,
              SHOW_PROMOTIONAL_CLOSE_PAGE: false,
              HIDE_INVITE_MORE_HEADER: true,
            }
          });

          const onReady = () => { clearTimeout(fallbackTimer); hideLoader(); };
          jitsiApi.addEventListener('videoConferenceJoined', onReady);
          jitsiApi.addEventListener('audioMuteStatusChanged', onReady);
          jitsiApi.addEventListener('readyToClose', () => { endCall(); });
        } catch(err) {
          clearTimeout(fallbackTimer);
          hideLoader();
          document.getElementById('callMeta').innerText = 'Could not start call: ' + err.message;
        }
      }, 400);
    }

    function endCall() {
      const overlay = document.getElementById('callOverlay');
      if (!overlay.classList.contains('open')) return;
      if (jitsiApi) {
        try { jitsiApi.dispose(); } catch(_) {}
        jitsiApi = null;
      }
      document.getElementById('callContainer').innerHTML = '';
      overlay.classList.remove('open');
    }

    /* ── Whiteboard ── */

    let wbSocket = null;
    let wbRoomId = null;
    let wbDrawing = false;
    let wbLastX = 0, wbLastY = 0;
    let wbColor = '#1e3a8a';
    let wbSize = 4;
    let wbEraser = false;
    let wbStrokes = [];       // local stroke history for undo
    let wbCurrentStroke = null;

    function getWbRoomId() {
      const [a, b] = getSortedIds();
      return 'ngp-wb-' + a + '-' + b;
    }

    function setWbColor(color, btn) {
      wbColor = color;
      wbEraser = false;
      document.getElementById('wbEraserBtn').classList.remove('active');
      document.querySelectorAll('.wb-color-swatch').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setWbSize(size, btn) {
      wbSize = size;
      document.querySelectorAll('.wb-size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleWbEraser() {
      wbEraser = !wbEraser;
      document.getElementById('wbEraserBtn').classList.toggle('active', wbEraser);
    }

    function getWbCanvas() { return document.getElementById('wbCanvas'); }
    function getWbCtx() { return getWbCanvas().getContext('2d'); }

    function wbResizeCanvas() {
      const canvas = getWbCanvas();
      const parent = canvas.parentElement;
      const imageData = getWbCtx().getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = parent.clientWidth;
      canvas.height = parent.clientHeight;
      getWbCtx().putImageData(imageData, 0, 0);
    }

    function wbReplayStrokes() {
      const canvas = getWbCanvas();
      const ctx = getWbCtx();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      wbStrokes.forEach(stroke => wbDrawStroke(stroke));
    }

    function wbDrawStroke(stroke) {
      const ctx = getWbCtx();
      ctx.strokeStyle = stroke.eraser ? '#ffffff' : stroke.color;
      ctx.lineWidth = stroke.eraser ? stroke.size * 3 : stroke.size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      if (stroke.points && stroke.points.length > 0) {
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        ctx.stroke();
      }
    }

    function wbDrawSegment(x0, y0, x1, y1, color, size, eraser) {
      const ctx = getWbCtx();
      ctx.strokeStyle = eraser ? '#ffffff' : color;
      ctx.lineWidth = eraser ? size * 3 : size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }

    function wbPointerDown(e) {
      wbDrawing = true;
      const rect = getWbCanvas().getBoundingClientRect();
      const scaleX = getWbCanvas().width / rect.width;
      const scaleY = getWbCanvas().height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      wbLastX = (clientX - rect.left) * scaleX;
      wbLastY = (clientY - rect.top) * scaleY;
      wbCurrentStroke = { color: wbColor, size: wbSize, eraser: wbEraser, points: [{ x: wbLastX, y: wbLastY }] };
    }

    function wbPointerMove(e) {
      if (!wbDrawing) return;
      e.preventDefault();
      const rect = getWbCanvas().getBoundingClientRect();
      const scaleX = getWbCanvas().width / rect.width;
      const scaleY = getWbCanvas().height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const x = (clientX - rect.left) * scaleX;
      const y = (clientY - rect.top) * scaleY;
      wbDrawSegment(wbLastX, wbLastY, x, y, wbColor, wbSize, wbEraser);
      if (wbCurrentStroke) wbCurrentStroke.points.push({ x, y });
      if (wbSocket) {
        wbSocket.emit('wb:draw', { roomId: wbRoomId, stroke: { type: 'segment', x0: wbLastX, y0: wbLastY, x1: x, y1: y, color: wbColor, size: wbSize, eraser: wbEraser } });
      }
      wbLastX = x;
      wbLastY = y;
    }

    function wbPointerUp() {
      if (!wbDrawing) return;
      wbDrawing = false;
      if (wbCurrentStroke) {
        wbStrokes.push(wbCurrentStroke);
        wbCurrentStroke = null;
      }
    }

    function undoWb() {
      if (!wbStrokes.length) return;
      wbStrokes.pop();
      wbReplayStrokes();
      if (wbSocket) wbSocket.emit('wb:undo', wbRoomId);
    }

    function clearWb() {
      wbStrokes = [];
      const canvas = getWbCanvas();
      getWbCtx().clearRect(0, 0, canvas.width, canvas.height);
      if (wbSocket) wbSocket.emit('wb:clear', wbRoomId);
    }

    function openWhiteboard() {
      if (!activeTeacherId) return;
      wbRoomId = getWbRoomId();
      document.getElementById('whiteboardOverlay').classList.add('open');
      document.getElementById('wbLoading').style.display = 'flex';

      const canvas = getWbCanvas();
      const parent = canvas.parentElement;
      // Set canvas resolution
      setTimeout(() => {
        canvas.width = parent.clientWidth || 800;
        canvas.height = parent.clientHeight || 500;

        // Wire up drawing events
        canvas.onmousedown = wbPointerDown;
        canvas.onmousemove = wbPointerMove;
        canvas.onmouseup = wbPointerUp;
        canvas.onmouseleave = wbPointerUp;
        canvas.ontouchstart = wbPointerDown;
        canvas.ontouchmove = wbPointerMove;
        canvas.ontouchend = wbPointerUp;

        // Connect Socket.IO
        if (!wbSocket || !wbSocket.connected) {
          wbSocket = io();
          wbSocket.on('connect', () => {
            document.getElementById('wbDot').className = 'wb-dot';
            document.getElementById('wbConnStatus').innerText = 'Connected · Live';
            wbSocket.emit('wb:join', wbRoomId);
          });
          wbSocket.on('disconnect', () => {
            document.getElementById('wbDot').className = 'wb-dot offline';
            document.getElementById('wbConnStatus').innerText = 'Disconnected';
          });
          // Receive full board state when joining
          wbSocket.on('wb:state', (state) => {
            document.getElementById('wbLoading').style.display = 'none';
            wbStrokes = state.strokes || [];
            // Replay as segments from stored strokes
            wbStrokes.forEach(stroke => {
              if (stroke.type === 'segment') {
                wbDrawSegment(stroke.x0, stroke.y0, stroke.x1, stroke.y1, stroke.color, stroke.size, stroke.eraser);
              }
            });
          });
          // Receive individual stroke from peer
          wbSocket.on('wb:draw', (stroke) => {
            if (stroke.type === 'segment') {
              wbDrawSegment(stroke.x0, stroke.y0, stroke.x1, stroke.y1, stroke.color, stroke.size, stroke.eraser);
              wbStrokes.push(stroke);
            }
          });
          wbSocket.on('wb:clear', () => {
            wbStrokes = [];
            const c = getWbCanvas();
            getWbCtx().clearRect(0, 0, c.width, c.height);
          });
          wbSocket.on('wb:undo', () => {
            if (wbStrokes.length) wbStrokes.pop();
            // Redraw all remaining segments
            const c = getWbCanvas();
            getWbCtx().clearRect(0, 0, c.width, c.height);
            wbStrokes.forEach(s => {
              if (s.type === 'segment') wbDrawSegment(s.x0, s.y0, s.x1, s.y1, s.color, s.size, s.eraser);
            });
          });
        } else {
          wbSocket.emit('wb:join', wbRoomId);
          document.getElementById('wbLoading').style.display = 'none';
        }

        // If no state received after 1s, hide loader (empty board)
        setTimeout(() => { document.getElementById('wbLoading').style.display = 'none'; }, 1200);
      }, 150);
    }

    function closeWhiteboard() {
      const overlay = document.getElementById('whiteboardOverlay');
      if (!overlay.classList.contains('open')) return;
      overlay.classList.remove('open');
      // Disconnect socket cleanly
      if (wbSocket) { wbSocket.disconnect(); wbSocket = null; }
    }

    async function loadMessages() {
      if (!activeTeacherId) return;
      const res = await fetch('/api/chat/conversation/' + activeTeacherId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const box = document.getElementById('chatBox');
      box.innerHTML = '';

      const messages = data.messages || [];
      if (activeTeacher) {
        const last = messages[messages.length - 1];
        if (last) {
          activeTeacher.lastMessage = last.text;
          activeTeacher.lastMessageTime = last.createdAt;
          activeTeacher.lastSender = last.sender;
          activeTeacher.unread = false;
          activeTeacher.lastReadAt = last.createdAt;
          const state = loadReadState();
          state[activeTeacherId] = activeTeacher.lastReadAt;
          saveReadState(state);
        }
      }

      messages.forEach(function(m) {
        const row = document.createElement('div');
        row.className = 'message-row ' + (m.sender === activeTeacherId ? 'theirs' : 'mine');

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = m.text;

        const meta = document.createElement('div');
        meta.className = 'message-time';
        const time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        meta.innerText = time;

        row.append(bubble, meta);
        box.appendChild(row);
      });

      box.scrollTop = box.scrollHeight;
      renderTeacherList();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !activeTeacherId) return;

      await fetch('/api/chat/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ receiverId: activeTeacherId, text })
      });

      input.value = '';
      await loadMessages();
      renderTeacherList();
    }

    function handleMessageKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    async function fetchLastMessage(teacherId) {
      try {
        const res = await fetch('/api/chat/conversation/' + teacherId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const messages = data.messages || [];
        if (!messages.length) return null;
        const last = messages[messages.length - 1];
        return {
          text: last.text,
          sender: last.sender,
          createdAt: last.createdAt
        };
      } catch (err) {
        return null;
      }
    }

    async function updateTeacherStatus(teacher) {
      const last = await fetchLastMessage(teacher._id);
      if (!last) return;
      teacher.lastMessage = last.text;
      teacher.lastMessageTime = last.createdAt;
      teacher.lastSender = last.sender;
      const lastReadAtMs = teacher.lastReadAt ? new Date(teacher.lastReadAt).getTime() : 0;
      const lastCreatedMs = new Date(last.createdAt).getTime();
      if (teacher._id === activeTeacherId) {
        teacher.unread = false;
      } else {
        teacher.unread = last.sender === teacher._id && (lastReadAtMs === 0 || lastCreatedMs > lastReadAtMs);
      }
    }

    function startTeacherPolling() {
      setInterval(async () => {
        await Promise.all(teachers.map(updateTeacherStatus));
        renderTeacherList();
        if (activeTeacherId) {
          await loadMessages();
        }
      }, 3000);
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    loadTeachers();
  </script>
</body>
