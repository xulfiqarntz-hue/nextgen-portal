<!DOCTYPE html>
<html>

<head>
  <title>Student Dashboard</title>
  <style>
    :root {
      --bg: #1E40AF;
      --panel: #1E3A8A;
      --surface: #1E40AF;
      --surface-alt: #1E429F;
      --text: #ffffff;
      --muted: #6b7280;
      --card: #233c92;
      --border: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      width: 100%;
      font-family: Inter, system-ui, sans-serif;
      color: #111827;
      background: #f3f4f6;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: 100vh;
      height: 100vh;
      padding: 0;
    }

    .sidebar {
      background: rgb(247 247 247);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .sidebar-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
    }

    .logout-btn {
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgb(107 114 128 / 10%);
      color: #111827;
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .logout-btn:hover {
      transform: scale(0.95);
    }

    .search-box {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #ffffff;
      color: #111827;
      caret-color: #111827;
      cursor: text;
    }

    .search-box input:focus {
      outline: none;
      border-color: rgba(107, 114, 128, 0.7);
      background: #ffffff;
      color: #111827;
      caret-color: #111827;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .chat-item {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      margin: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
      color: #111827;
      text-align: left;
    }

    .chat-item:hover,
    .chat-item.active {
      background: rgba(14, 165, 233, 0.12);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgb(107 114 128 / 15%);
      font-weight: 700;
      color: #111827;
      font-size: 1rem;
    }

    .chat-info {
      min-width: 0;
      text-align: left;
    }

    .chat-name {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111827;
    }

    .chat-last {
      margin: 6px 0 0;
      color: rgba(17, 24, 39, 0.65);
      font-size: 0.88rem;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 0;
      overflow: hidden;
      color: #111827;
    }

    .main-panel-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: #ffffff;
      gap: 8px;
    }

    .main-panel-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      color: #111827;
    }

    .main-panel-header p {
      margin: 0;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 28px 20px;
      flex: 1;
      background: #ffffff;
    }

    .messages {
      display: grid;
      gap: 14px;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 260px;
    }

    .message-row {
      display: flex;
      align-items: center;
      max-width: 78%;
    }

    .message-row.mine {
      margin-left: auto;
      justify-content: flex-end;
    }

    .message-row.theirs {
      justify-content: flex-start;
    }

    .message-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      border: none;
      color: #ffffff;
      min-width: 100px;
      max-width: 100%;
      box-shadow: 0 10px 25px rgba(14, 42, 99, 0.08);
    }

    .message-row.mine .message-bubble {
      background: #1E3A8A;
    }

    .message-row.theirs .message-bubble {
      background: #e5e7eb;
      color: #0f172a;
      box-shadow: none;
    }

    .message-time {
      margin: 0 0 0 10px;
      color: #64748b;
      font-size: 0.78rem;
      text-align: right;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
    }

    .bottom-bar {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding: 18px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #f8fafc;
    }

    .bottom-bar input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      padding: 14px 16px;
      font-size: 0.96rem;
    }

    .bottom-bar button {
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      height: 48px;
      cursor: pointer;
      font-weight: 700;
      display: grid;
      place-items: center;
      background: #1E3A8A;
      color: #ffffff;
      width: 48px;
      min-width: 48px;
      font-size: 1.1rem;
      line-height: 1;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }

      .main-panel {
        min-height: 560px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Chats</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="Search teachers...">
      </div>
      <div id="teacherList" class="chat-list">Loading teachers...</div>
    </aside>

    <section class="main-panel">
      <div class="main-panel-header">
        <h2 id="welcome">Welcome</h2>
        <p id="chatTitle">Select a teacher to begin</p>
      </div>

      <div class="chat-window">
        <div id="chatSection" style="display:none;">
          <div id="chatBox" class="messages"></div>
        </div>
      </div>

      <div class="bottom-bar">
        <input id="chatInput" type="text" placeholder="Type a message...">
        <button class="btn-send" onclick="sendMessage()" aria-label="Send message">➤</button>
      </div>
    </section>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const role = localStorage.getItem('role');
    let activeTeacherId = null;
    let pollTimer = null;

    if (!token || role !== 'student') {
      window.location.href = '/login.html';
    }

    document.getElementById('welcome').innerText = 'Welcome, ' + name;

    async function loadTeachers() {
      const res = await fetch('/api/my-teachers', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const container = document.getElementById('teacherList');
      container.innerHTML = '';

      if (data.teachers && data.teachers.length > 0) {
        data.teachers.forEach(function(t) {
          const div = document.createElement('button');
          div.type = 'button';
          div.className = 'chat-item';
          div.onclick = function() { openChat(t._id, div, t.name, t.email); };

          const avatar = document.createElement('div');
          avatar.className = 'avatar';
          const nameParts = t.name.trim().split(/\s+/);
          const initials = nameParts.length > 1
            ? (nameParts[0][0] + nameParts[1][0]).toUpperCase()
            : t.name.trim().slice(0, 2).toUpperCase();
          avatar.innerText = initials;

          const info = document.createElement('div');
          info.className = 'chat-info';
          info.innerHTML = '<p class="chat-name">' + t.name + '</p><p class="chat-last">' + (t.email || '') + '</p>';

          div.append(avatar, info);
          container.appendChild(div);
        });
      } else {
        container.innerHTML = '<p style="padding:20px;color:var(--muted);">No teachers assigned yet.</p>';
      }
    }

    function openChat(teacherId, el, teacherName) {
      activeTeacherId = teacherId;
      document.querySelectorAll('.chat-item').forEach(function(d) { d.classList.remove('active'); });
      el.classList.add('active');
      document.getElementById('chatTitle').innerText = teacherName;
      document.getElementById('chatSection').style.display = 'block';
      loadMessages();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
      if (!activeTeacherId) return;
      const res = await fetch('/api/chat/conversation/' + activeTeacherId, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const box = document.getElementById('chatBox');
      box.innerHTML = '';

      data.messages.forEach(function(m) {
        const row = document.createElement('div');
        row.className = 'message-row ' + (m.sender === activeTeacherId ? 'theirs' : 'mine');

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = m.text;

        const meta = document.createElement('div');
        meta.className = 'message-time';
        const time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        meta.innerText = time;

        row.append(bubble, meta);
        box.appendChild(row);
      });

      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !activeTeacherId) return;

      await fetch('/api/chat/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ receiverId: activeTeacherId, text })
      });

      input.value = '';
      loadMessages();
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    loadTeachers();
  </script>
</body>

</html>
