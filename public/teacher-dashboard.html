<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 30px; }
    .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { color: #1a3c6e; }
    .student { padding: 12px; background: #eaf1fb; border-radius: 8px; margin-top: 10px; }
    button { margin-top: 20px; padding: 10px 15px; background: #b91c1c; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="welcome">Welcome</h2>
    <p>Your assigned students:</p>
    <div id="studentList">Loading...</div>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const role = localStorage.getItem('role');

    if (!token || role !== 'teacher') {
      window.location.href = '/login.html';
    }

    document.getElementById('welcome').innerText = 'Welcome, ' + name;

    async function loadStudents() {
      const res = await fetch('/api/my-students', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const container = document.getElementById('studentList');
      container.innerHTML = '';

      if (data.students && data.students.length > 0) {
        data.students.forEach(function(s) {
          const div = document.createElement('div');
          div.className = 'student';
          div.innerText = s.name + ' (' + s.email + ')';
          container.appendChild(div);
        });
      } else {
        container.innerText = 'No students assigned yet.';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    loadStudents();
  </script>
</body>
</html>
