<!DOCTYPE html>
<html>

<head>
  <title>Teacher Dashboard</title>
  <style>
    :root {
      --bg: #1E40AF;
      --panel: #1E3A8A;
      --surface: #1E40AF;
      --surface-alt: #1E429F;
      --text: #ffffff;
      --muted: #d1d5db;
      --card: #233c92;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      width: 100%;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: #f3f4f6;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: 100vh;
      height: 100vh;
      padding: 0;
    }

    .sidebar {
      background: rgb(217 217 217);
      border: 1px solid var(--border);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .logout-btn:hover {
      transform: scale(0.95);
    }

    .search-box {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #000000;
      caret-color: #000000;
      cursor: text;
    }

    .search-box input:focus {
      outline: none;
      border-color: rgba(107, 114, 128, 0.7);
      background: rgba(255, 255, 255, 0.94);
      color: #000000;
      caret-color: #000000;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .chat-item {
      width: 100%;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      margin: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .chat-item:hover,
    .chat-item.active {
      background: rgba(255, 255, 255, 0.08);
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgb(105 105 105 / 95%);
      font-weight: 700;
      color: var(--text);
      font-size: 1.1rem;
    }

    .sidebar-header h1 {
      margin: 0;
      color: rgb(105 105 105 / 95%);
    }

    .logout-btn {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgb(105 105 105 / 95%);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .chat-info {
      min-width: 0;
      text-align: left;
    }

    .chat-name {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-last {
      margin: 6px 0 0;
      color: rgba(0, 0, 0, 0.644);
      font-size: 0.88rem;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pinned {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.12);
      color: #fcd34d;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .unread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 28px;
      padding: 0 10px;
      background: #ef4444;
      color: #ffffff;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #ffffff;
      border: 1px solid rgba(30, 58, 138, 0.14);
      border-radius: 0;
      overflow: hidden;
      color: #111827;
    }

    .main-panel-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 22px 28px;
      border-bottom: 1px solid rgb(189, 189, 189);
      background: #ffffff;
      gap: 10px;
    }

    .main-panel-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
      color: #6F6F6F;
    }



    .chat-window {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px 28px 20px;
      flex: 1 1 auto;
      min-height: 0;
      background: #ffffff;
      overflow: hidden;
    }

    .messages {
      /* allow the messages area to grow and scroll, keeping the typing box visible */
      display: grid;
      gap: 14px;
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 4px;
    }

    .message-row {
      display: flex;
      align-items: center;
      max-width: 78%;
    }

    .message-row.teacher {
      margin-left: auto;
      justify-content: flex-end;
    }

    .message-row.student {
      justify-content: flex-start;
    }

    .message-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      border: none;
      color: #ffffff;
      min-width: 100px;
      max-width: 100%;
      box-shadow: 0 10px 25px rgba(30, 58, 138, 0.08);
    }

    .message-row.teacher .message-bubble {
      background: #1E3A8A;
    }

    .message-row.student .message-bubble {
      background: #e5e7eb;
      color: #0f172a;
      box-shadow: none;
    }

    .message-time {
      margin: 0 0 0 10px;
      color: #64748b;
      font-size: 0.78rem;
      text-align: right;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
    }

    .bottom-bar {
      border-top: 1px solid rgba(30, 58, 138, 0.14);
      padding: 18px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #f8fafc;
    }

    .bottom-bar.hidden {
      display: none;
    }

    .message-input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-input-group label {
      margin: 0;
      color: #475569;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .bottom-bar input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      padding: 14px 16px;
      font-size: 0.96rem;
    }

    .bottom-bar button {
      border: none;
      border-radius: 16px;
      padding: 0 18px;
      height: 48px;
      cursor: pointer;
      font-weight: 700;
      display: grid;
      place-items: center;
    }

    .btn-send {
      background: #1E3A8A;
      color: #ffffff;
      width: 48px;
      min-width: 48px;
      font-size: 1.1rem;
      line-height: 1;
    }

    .btn-photo {
      background: rgba(30, 58, 138, 0.12);
      color: #1E3A8A;
      min-width: 48px;
      font-size: 1.1rem;
    }

    .bottom-bar svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .student-meta {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .student-meta .avatar-large {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.16);
      font-weight: 700;
      color: var(--text);
      font-size: 1.1rem;
    }

    .student-details {
      min-width: 0;
    }

    .student-details h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .student-details p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }

      .main-panel {
        min-height: 560px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Chats</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="Search students..." oninput="renderChatList()">
      </div>
      <div id="chatList" class="chat-list">Loading chats...</div>
    </aside>

    <section class="main-panel">
      <div class="main-panel-header">
        <h2 id="chatTitle">Select a student to begin</h2>
      </div>

      <div class="chat-window">
        <div id="messages" class="messages"></div>
      </div>

      <div id="bottomBar" class="bottom-bar hidden">
        <div class="message-input-group">
          <input id="messageInput" type="text" placeholder="Type a message..." onkeydown="handleMessageKeydown(event)">
        </div>
        <button class="btn-send" onclick="sendMessage()" aria-label="Send message">➤</button>
      </div>
    </section>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const name = localStorage.getItem('name');
    const role = localStorage.getItem('role');
    const readStateKey = 'teacherStudentReadAt';
    let students = [];
    let activeStudent = null;
    let activeMessages = [];

    if (!token || role !== 'teacher') {
      window.location.href = '/login.html';
    }

    function loadReadState() {
      try {
        const raw = localStorage.getItem(readStateKey);
        return raw ? JSON.parse(raw) : {};
      } catch (err) {
        return {};
      }
    }

    function saveReadState(state) {
      localStorage.setItem(readStateKey, JSON.stringify(state));
    }

    async function loadStudents() {
      const readState = loadReadState();
      const res = await fetch('/api/my-students', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      students = data.students || [];
      students.forEach(s => {
        s.lastMessage = 'No messages yet.';
        s.lastMessageTime = null;
        s.lastReadAt = readState[s._id] || null;
        s.lastSender = null;
        s.unread = false;
        s.pinned = false;
      });

      await Promise.all(students.map(student => updateStudentStatus(student)));
      renderChatList();
      startStudentPolling();
    }

    async function fetchLastMessage(studentId) {
      try {
        const res = await fetch('/api/chat/conversation/' + studentId, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const messages = data.messages || [];
        if (!messages.length) return null;
        const last = messages[messages.length - 1];
        return {
          text: last.text,
          sender: last.sender,
          createdAt: last.createdAt
        };
      } catch (err) {
        return null;
      }
    }

    async function renderChatList() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const container = document.getElementById('chatList');
      container.innerHTML = '';
      const filtered = students.filter(s => s.name.toLowerCase().includes(query) || s.email.toLowerCase().includes(query));

      if (!filtered.length) {
        container.innerHTML = '<p style="padding:20px;color:var(--muted);">No chats found.</p>';
        return;
      }

      filtered.forEach(student => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'chat-item' + (activeStudent && activeStudent._id === student._id ? ' active' : '');
        item.onclick = () => selectStudent(student);

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        const nameParts = student.name.trim().split(/\s+/);
        const initials = nameParts.length > 1
          ? (nameParts[0][0] + nameParts[1][0]).toUpperCase()
          : student.name.trim().slice(0, 2).toUpperCase();
        avatar.innerText = initials;

        const info = document.createElement('div');
        info.className = 'chat-info';
        info.innerHTML = '<p class="chat-name">' + student.name + '</p><p class="chat-last">' + (student.lastMessage || 'No messages yet.') + '</p>';

        const meta = document.createElement('div');
        meta.style.display = 'flex';
        meta.style.alignItems = 'center';
        meta.style.justifyContent = 'flex-end';
        meta.style.gap = '8px';

        if (student.unread) {
          meta.innerHTML = '<span class="unread-badge">New</span>';
        } else if (student.pinned) {
          meta.innerHTML = '<span class="pinned">★ Pinned</span>';
        }

        item.append(avatar, info, meta);
        container.appendChild(item);
      });
    }

    async function selectStudent(student) {
      activeStudent = student;
      document.getElementById('chatTitle').innerText = student.name;
      document.getElementById('bottomBar').classList.remove('hidden');
      await loadMessages(student);
      student.lastReadAt = student.lastMessageTime || new Date().toISOString();
      student.unread = false;
      const state = loadReadState();
      state[student._id] = student.lastReadAt;
      saveReadState(state);
      renderChatList();
    }

    async function loadMessages(student) {
      const res = await fetch('/api/chat/conversation/' + student._id, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      activeMessages = data.messages || [];
      updateLastMessage(student, activeMessages);
      renderMessages();

      if (activeMessages.length) {
        const last = activeMessages[activeMessages.length - 1];
        student.lastReadAt = last.createdAt;
        student.unread = false;
        const state = loadReadState();
        state[student._id] = student.lastReadAt;
        saveReadState(state);
      }
    }

    function updateLastMessage(student, messages) {
      if (!messages.length) return;
      const last = messages[messages.length - 1];
      student.lastMessage = last.text;
      student.lastMessageTime = last.createdAt;
      student.lastSender = last.sender;
      student.pinned = last.text.toLowerCase().includes('important') || student.pinned;
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      container.innerHTML = '';

      activeMessages.forEach(msg => {
        const row = document.createElement('div');
        row.className = 'message-row ' + (msg.sender === activeStudent._id ? 'student' : 'teacher');

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = msg.text;

        const meta = document.createElement('div');
        meta.className = 'message-time';
        const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        meta.innerText = time;

        row.append(bubble, meta);
        container.appendChild(row);
      });

      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !activeStudent) return;

      await fetch('/api/chat/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ receiverId: activeStudent._id, text })
      });

      input.value = '';
      await loadMessages(activeStudent);
      renderChatList();
    }

    async function updateStudentStatus(student) {
      const last = await fetchLastMessage(student._id);
      if (!last) return;
      student.lastMessage = last.text;
      student.lastMessageTime = last.createdAt;
      student.lastSender = last.sender;
      const lastReadAtMs = student.lastReadAt ? new Date(student.lastReadAt).getTime() : 0;
      const lastCreatedMs = new Date(last.createdAt).getTime();
      student.unread = last.sender === student._id && (lastReadAtMs === 0 || lastCreatedMs > lastReadAtMs);
      student.pinned = last.text.toLowerCase().includes('important') || student.pinned;
    }

    function startStudentPolling() {
      setInterval(async () => {
        await Promise.all(students.map(updateStudentStatus));
        renderChatList();
        if (activeStudent) {
          await loadMessages(activeStudent);
        }
      }, 3000);
    }

    function handleMessageKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function attachPhoto() {
      alert('Picture upload not implemented yet.');
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    loadStudents();
  </script>
</body>

</html>
